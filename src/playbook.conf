<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>EB OS</Name>
    <Username>EB</Username>
    <Title>EB Playbook</Title>
    <ShortDescription>Gaming &amp; Streaming Playbook for Windows 10 and 11</ShortDescription>
    <Description>This Playbook will help you quickly deploy EB OS on your current system.</Description>
    <Details>Experience a gaming and streaming optimized system, designed to enhance performance and privacy while ensuring compatibility.</Details>
    <Version>26.05</Version>
    <UniqueId>6a93ec26-284d-4943-9fc4-c9616def55c6</UniqueId>
    <UpgradableFrom>any</UpgradableFrom>
    <SupportedBuilds>
        <string>19044</string>
        <string>19045</string>
        <string>22631</string>
        <string>26100</string>
        <string>26200</string>
        <string>26300</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>DefenderToggled</Requirement>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>Internet</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <UseKernelDriver>false</UseKernelDriver>
    <ProductCode>32</ProductCode>
    <Git>https://github.com/meetrevision/playbook</Git>
    <Website>https://revi.cc</Website>
    <DonateLink>https://revi.cc/donate</DonateLink>
    <SupportsISO>true</SupportsISO>
	<ISO>
		<DisableBitLocker>true</DisableBitLocker>
		<DisableHardwareRequirements>true</DisableHardwareRequirements>
	</ISO>
	<OOBE>
		<BulletPoints>
			<BulletPoint Icon="Rocket" Title="Performance Boost" Description="Enjoy faster boot times, reduced latency, and optimized resource usage for gaming and productivity."/>
			<BulletPoint Icon="Privacy" Title="Enhaned Privacy" Description="Take control of your data with disabled telemetry and unnecessary services that compromise your privacy."/>
			<BulletPoint Icon="Lock" Title="Revision Tool" Description="Fine-tune your system with our dedicated tool for advanced customization and optimization."/>
		</BulletPoints>
        <Internet>Request</Internet> 
	</OOBE>
    <Software>
        <Package Option="browser-brave" DefaultWebBrowser="true">
            <Name>brave</Name>
            <Title>Brave</Title>
            <Description>Brave is a free and open-source web browser based on the Chromium web browser, privacy-focused and developed by Brave Software, Inc.</Description>
            <Icon>brave.png</Icon>
        </Package>
		<Package Option="browser-firefox" DefaultWebBrowser="true">
			<Name>firefox</Name>
			<Title>Firefox</Title>
			<Description>Firefox is a free and open-source web browser developed by the Mozilla Foundation, known for its privacy features, and customizability.</Description>
			<Icon>firefox.png</Icon>
		</Package>
        <Package Option="streaming-obs">
            <Name>obs-studio</Name>
            <Title>OBS Studio</Title>
            <Description>OBS Studio is a free and open-source software for video recording and live streaming.</Description>
            <Icon>obs.png</Icon>
        </Package>
        <Package Option="streaming-groundcontrol">
            <Name>groundcontrol</Name>
            <Title>StreamElements GroundControl</Title>
            <Description>GroundControl is a streaming dashboard and scene manager by StreamElements.</Description>
            <Icon>groundcontrol.png</Icon>
        </Package>
        <Package Option="streaming-discord">
            <Name>discord</Name>
            <Title>Discord</Title>
            <Description>Discord is the social hub for gamers and streamers — voice, video, and text chat.</Description>
            <Icon>discord.png</Icon>
        </Package>
        <Package Option="streaming-voicemeeter">
            <Name>voicemeeter-banana</Name>
            <Title>Voicemeeter Banana</Title>
            <Description>Voicemeeter Banana is an advanced audio mixer for routing and managing audio sources during streams.</Description>
            <Icon>voicemeeter.png</Icon>
        </Package>
    </Software>
    <FeaturePages>
        <RadioImagePage CheckDefaultBrowser="true" DependsOn="software"
            DefaultOption="browser-brave" IsRequired="true"
            Description="Please select a preferred browser. We can only provide a curated experience for some options.">
            <Options>
                <RadioImageOption None="true" />
                <RadioImageOption>
                    <Text>Brave</Text>
                    <Name>browser-brave</Name>
                    <FileName>brave</FileName>
                    <GradientTopColor>#392DD1</GradientTopColor>
                    <GradientBottomColor>#A91B78</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Firefox</Text>
                    <Name>browser-firefox</Name>
                    <FileName>firefox</FileName>
                    <GradientTopColor>#FF3647</GradientTopColor>
                    <GradientBottomColor>#FFC742</GradientBottomColor>
                </RadioImageOption>
            </Options>
            <BottomLine Text="Privacy comparison" Link="https://privacytests.org/" />
        </RadioImagePage>
        <RadioPage DefaultOption="disable-defender" Description="Disabling Windows Defender can improve system performance, but at the cost of security.">
            <Options>
                <RadioOption>
                    <Text>Disable Defender (Default)</Text>
                    <Name>disable-defender</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Enable Defender</Text>
                    <Name>enable-defender</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <RadioPage DefaultOption="disable-hibernate" Description="Disabling frees disk space and prevents dual-boot or upgrade instability.">
            <TopLine Text="This includes Fast Startup"/>
            <Options>
                <RadioOption>
                    <Text>Disable Hibernate (Default)</Text>
                    <Name>disable-hibernate</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Enable Hibernate</Text>
                    <Name>enable-hibernate</Name>
                </RadioOption>
            </Options>
            <BottomLine Text="⚠️ Disabling may overheat laptops in sleep mode"/>
        </RadioPage>
        <CheckboxPage IsRequired="true" Description="Please select which components you would like to include or exclude with this Playbook.">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Remove Microsoft Edge</Text>
                    <Name>remove-edge</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove OneDrive</Text>
                    <Name>remove-onedrive</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove AI (Recall &amp; Copilot)</Text>
                    <Name>remove-winsxs-ai</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove Microsoft Teams</Text>s
                    <Name>remove-teams</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
        <CheckboxPage IsRequired="true" Description="Please select which UWP Appx packages you would like to remove.">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Remove MS Photos</Text>
                    <Name>remove-appx-photos</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove Dev Home</Text>
                    <Name>remove-appx-devhome</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Remove Xbox apps</Text>
                    <Name>remove-appx-xbox</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove 'Your Phone'</Text>
                    <Name>remove-appx-yourphone</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
        <CheckboxPage IsRequired="true" Description="General configuration options">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Apply EB wallpaper</Text>
                    <Name>configure-wallpaper</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Enable Dark Mode</Text>
                    <Name>configure-darkmode</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Enable Legacy Context Menu</Text>
                    <Name>configure-lcm</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Disable Transparency Effects</Text>
                    <Name>configure-te</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
        <CheckboxPage IsRequired="true" Description="General configuration options, page 2">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Remove pinned items in Start Menu</Text>
                    <Name>remove-pinned-items-startmenu</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Automatic Maintenance</Text>
                    <Name>disable-automatic-maintenance</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Taskbar Animations</Text>
                    <Name>configure-explorer-taskbar-animations</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
        <CheckboxPage IsRequired="false" Description="Select streaming and gaming tools to install.">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Install OBS Studio</Text>
                    <Name>streaming-obs</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Install StreamElements GroundControl</Text>
                    <Name>streaming-groundcontrol</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Install Discord</Text>
                    <Name>streaming-discord</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Install Voicemeeter Banana</Text>
                    <Name>streaming-voicemeeter</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
    </FeaturePages>
</Playbook>